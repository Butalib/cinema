<div class="app-layout">

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" [class.active]="sidebarService.isOpen()" (click)="sidebarService.close()">
  </div>

  <!-- Sidebar -->
  <app-side-bar [class.open]="sidebarService.isOpen()"></app-side-bar>

  <!-- Main Area -->
  <div class="main-area">

    <!-- Topbar -->
    <app-top-bar></app-top-bar>

    <!-- Page Content -->
    <div class="page-content">
      <app-coontent></app-coontent>
    </div>
    
  </div>
  
</div>
