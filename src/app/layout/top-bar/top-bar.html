<div class="topbar">

  <div class="topbar-left">
    <button class="menu-btn" (click)="sidebarService.toggle()" aria-label="Toggle menu">
      <i class="bi bi-list"></i>
    </button>

    <div class="title">
      {{ title() }}
    </div>
  </div>

  <div class="actions">

    <button class="icon-btn" aria-label="Notifications">
      <i class="bi bi-bell"></i>
    </button>

    <div class="profile">

      <div class="avatar">
        A
      </div>

      <span class="username">
        Admin User
      </span>

    </div>

  </div>

</div>
