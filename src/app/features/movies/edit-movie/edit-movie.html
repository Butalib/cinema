@if (movie()) {
<section class="form-page">

    <!-- Breadcrumb -->
    <nav class="breadcrumb-nav" aria-label="breadcrumb">
        <a routerLink="/movies" class="breadcrumb-link">
            <i class="bi bi-arrow-left"></i>
            Back to Movies
        </a>
    </nav>

    <h2 class="form-page-title">Edit Movie</h2>

    <!-- Movie Details Card -->
    <div class="form-card">
        <div class="form-card-header">
            <i class="bi bi-film"></i>
            <span>Movie Details</span>
        </div>
        <div class="form-card-body">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Movie Title</label>
                    <input type="text" class="form-control" placeholder="Enter movie title" [ngModel]="title()"
                        (ngModelChange)="title.set($event)" />
                </div>
                <div class="form-group">
                    <label class="form-label">Genre</label>
                    <input type="text" class="form-control" placeholder="e.g. Sci-Fi, Action, Drama" [ngModel]="genre()"
                        (ngModelChange)="genre.set($event)" />
                </div>
                <div class="form-group">
                    <label class="form-label">Duration</label>
                    <input type="text" class="form-control" placeholder="e.g. 2h 30m" [ngModel]="duration()"
                        (ngModelChange)="duration.set($event)" />
                </div>
                <div class="form-group">
                    <label class="form-label">Rating</label>
                    <input type="number" class="form-control" placeholder="0.0 – 10.0" min="0" max="10" step="0.1"
                        [ngModel]="rating()" (ngModelChange)="rating.set($event)" />
                </div>
                <div class="form-group">
                    <label class="form-label">Release Date</label>
                    <input type="date" class="form-control" [ngModel]="releaseDate()"
                        (ngModelChange)="releaseDate.set($event)" />
                </div>
                <div class="form-group">
                    <label class="form-label">Language</label>
                    <input type="text" class="form-control" placeholder="e.g. English, Arabic" [ngModel]="language()"
                        (ngModelChange)="language.set($event)" />
                </div>
                <div class="form-group">
                    <label class="form-label">Age Rating</label>
                    <input type="text" class="form-control" placeholder="e.g. PG-13, R" [ngModel]="ageRating()"
                        (ngModelChange)="ageRating.set($event)" />
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select class="form-control" [ngModel]="status()" (ngModelChange)="status.set($event)">
                        <option value="Active">Active</option>
                        <option value="Coming Soon">Coming Soon</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Credits & Brief Card -->
    <div class="form-card">
        <div class="form-card-header">
            <i class="bi bi-person-badge"></i>
            <span>Credits & Brief</span>
        </div>
        <div class="form-card-body">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Director</label>
                    <input type="text" class="form-control" placeholder="Director name" [ngModel]="director()"
                        (ngModelChange)="director.set($event)" />
                </div>
                <div class="form-group">
                    <label class="form-label">Cast (comma separated)</label>
                    <input type="text" class="form-control" placeholder="Actor 1, Actor 2, Actor 3" [ngModel]="cast()"
                        (ngModelChange)="cast.set($event)" />
                </div>
            </div>
            <div class="form-group full-width">
                <label class="form-label">Brief Description</label>
                <textarea class="form-control textarea" rows="4" placeholder="Brief description of the movie..."
                    [ngModel]="description()" (ngModelChange)="description.set($event)"></textarea>
            </div>
        </div>
    </div>

    <!-- Form Actions -->
    <div class="form-actions">
        <button class="btn-primary" (click)="submit()">
            <i class="bi bi-check-lg"></i>
            Update Movie Details
        </button>
        <button class="btn-secondary" (click)="cancel()">Cancel</button>
    </div>

</section>
} @else {
<div class="not-found">
    <i class="bi bi-film"></i>
    <p>Movie not found.</p>
    <a routerLink="/movies" class="back-link">Back to Movies</a>
</div>
}
